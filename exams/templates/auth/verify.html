{% extends "exams/base.html" %}

{% block content %}

<div style="max-width: 400px; margin: 80px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align:center;">

    <h2 style="color:#006400;">Verify Your Account</h2>

    <p>Enter the 6-digit code sent to your email</p>

    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        <input type="text"
               name="code"
               placeholder="------"
               maxlength="6"
               required
               style="width:100%; padding:12px; margin-top:15px; text-align:center; font-size:18px; letter-spacing:3px; border:1px solid #ccc; border-radius:6px;">

        <button type="submit"
                style="width:100%; padding:12px; margin-top:15px; background:#006400; color:white; border:none; border-radius:6px; font-size:16px;">
            Verify
        </button>
    </form>

    <a href="{% url 'resend_code' %}"
       style="display:block; margin-top:15px; color:#006400; text-decoration:underline;">
        Resend Code
    </a>

</div>
<input type="email" name="email" placeholder="Enter your email" required>
<input type="text" name="code" placeholder="Enter verification code" required>
{% endblock %}
