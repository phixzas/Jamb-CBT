{% extends "exams/base.html" %}

{% block content %}

<div class="container" style="max-width: 420px; margin: 80px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; color:#006400;">Login to JAMB CBT Practice</h2>

    <!-- Messages -->
    {% for message in messages %}
        <p style="color:red; text-align:center;">{{ message }}</p>
    {% endfor %}

    <form method="post">
        {% csrf_token %}

        <input type="text" 
               name="username" 
               placeholder="Username" 
               required
               style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:6px;">

        <input type="password" 
               name="password" 
               placeholder="Password" 
               required
               style="width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:6px;">

        <button type="submit" 
                style="width:100%; padding:14px; background:#006400; color:white; border:none; border-radius:8px; font-size:1.1rem;">
            Login
        </button>
    </form>

    <p style="text-align:center; margin-top:20px;">
        Don't have an account? 
        <a href="{% url 'register' %}" style="color:#006400; font-weight:bold;">
            Register here
        </a>
    </p>

</div>

{% endblock %}
