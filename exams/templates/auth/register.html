{% extends "exams/base.html" %}

{% block content %}

<div style="max-width:420px; margin:60px auto; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">

    <h2 style="text-align:center; color:#006400;">Create Account</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red; text-align:center; background:#ffebee; padding:10px; border-radius:6px;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required 
               style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <input type="text" name="full_name" placeholder="Full Name" required 
               style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <input type="email" name="email" placeholder="Email" required 
               style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <input type="password" name="password" placeholder="Password" required 
               style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <input type="text" name="referrer" placeholder="Referrer Code (optional)" 
               style="width:100%; padding:14px; margin:10px 0; border:1px solid #ccc; border-radius:8px;">

        <button type="submit" style="width:100%; padding:14px; background:#006400; color:white; border:none; border-radius:8px; font-size:1.1rem; margin-top:15px;">
            Register
        </button>

    </form>

</div>

<!-- ================= ADMOB BANNER AD ================= -->
<div style="max-width: 420px; margin: 25px auto; text-align:center; padding: 10px;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-app-pub-7511396451330815"
         data-ad-slot="8711858641"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

{% endblock %}
