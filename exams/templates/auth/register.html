{% extends "exams/base.html" %}

{% block content %}

<div style="max-width:420px;margin:80px auto;background:white;padding:25px;border-radius:10px;">

    <h2 style="text-align:center;color:#006400;">Create Account</h2>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required style="width:100%;padding:10px;margin:10px 0;">

        <input type="text" name="full_name" placeholder="Full Name" required style="width:100%;padding:10px;margin:10px 0;">

        <input type="email" name="email" placeholder="Email" required style="width:100%;padding:10px;margin:10px 0;">

        <input type="password" name="password" placeholder="Password" required style="width:100%;padding:10px;margin:10px 0;">

        <input type="text" name="referrer" placeholder="Referrer Code (optional)" style="width:100%;padding:10px;margin:10px 0;">

        <button type="submit" style="width:100%;padding:12px;background:#006400;color:white;border:none;">
            Register
        </button>

    </form>

</div>

{% endblock %}
