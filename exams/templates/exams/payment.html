<h2>Choose Subscription Plan</h2>

<form method="GET" action="{% url 'payment_page' %}">
    <label>
        <input type="radio" name="plan" value="monthly" required>
        Monthly Plan - ₦1,000
    </label>

    <br><br>

    <label>
        <input type="radio" name="plan" value="yearly" required>
        Yearly Plan - ₦5,000
    </label>

    <br><br>

    <button type="submit">
        Continue to Payment
    </button>
</form>
