<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>JAMB CBT Practice</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Favicon Fix -->
    <link rel="icon" href="data:,">
    <link rel="shortcut icon" href="data:,">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Arial, sans-serif;
            background-color:#f8f9fa;
        }

        /* NAVBAR */

        .navbar{
            background-color:#006400;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            padding:12px 20px;
        }

        .navbar-brand{
            color:white !important;
            font-weight:bold;
            font-size:1.2rem;
        }

        .navbar-nav .nav-link{
            color:white !important;
            font-weight:500;
            margin-right:10px;
        }

        .navbar-nav .nav-link:hover{
            color:#90EE90 !important;
        }

        .navbar-nav .nav-link.active{
            color:#90EE90 !important;
        }

        /* BUTTONS */

        .login-btn{
            background:white;
            color:#006400 !important;
            padding:8px 15px;
            border-radius:6px;
            text-decoration:none;
            font-weight:600;
            margin-right:8px;
        }

        .register-btn{
            background:#00a000;
            color:white !important;
            padding:8px 15px;
            border-radius:6px;
            text-decoration:none;
            font-weight:600;
        }

        .login-btn:hover,
        .register-btn:hover{
            opacity:0.9;
        }

        .welcome-text{
            color:white;
            margin-right:12px;
            font-weight:500;
        }

        /* MAIN CONTAINER */

        .main-container{
            padding-top:30px;
            padding-bottom:50px;
        }

        /* MESSAGE BOX */

        .message-box{
            background:#e6ffed;
            border-left:6px solid #28a745;
            padding:12px;
            margin-bottom:20px;
            border-radius:6px;
            color:#155724;
            font-weight:500;
        }

        /* MOBILE RESPONSIVENESS */

        @media (max-width:768px){

            .navbar{
                padding:10px 15px;
            }

            .navbar-nav{
                margin-top:10px;
            }

            .navbar-nav .nav-link{
                padding:10px 0;
            }

            .welcome-text{
                display:block;
                margin-bottom:10px;
            }

            .main-container{
                padding-left:10px;
                padding-right:10px;
            }

        }

    </style>

</head>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({
         google_ad_client: "ca-app-pub-7511396451330815",
         enable_page_level_ads: true
     });
</script>
<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container-fluid">

        <!-- LOGO -->

        <a class="navbar-brand"
           href="{% url 'home' %}">
            JAMB CBT
        </a>

        <!-- MOBILE MENU BUTTON -->

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- NAVIGATION LINKS -->

        <div class="collapse navbar-collapse justify-content-between"
             id="navbarNav">

            <!-- LEFT NAV -->

            <ul class="navbar-nav flex-row flex-wrap justify-content-center gap-2">

                <li class="nav-item">

                    <a class="nav-link {% if request.path == '/' %}active{% endif %}"
                       href="{% url 'home' %}">
                        Home
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link {% if 'subjects' in request.path or 'past' in request.path %}active{% endif %}"
                       href="{% url 'subjects' %}">
                        Subjects
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link {% if 'mock-test' in request.path %}active{% endif %}"
                       href="{% url 'mock_test' %}">
                        Mock Test
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="{% url 'counseling' %}">
                        Counseling
                    </a>

                </li>

            </ul>

            <!-- RIGHT SIDE -->

            <div class="d-flex align-items-center justify-content-center gap-2 mt-2 mt-lg-0">

                {% if user.is_authenticated %}

                    <span class="welcome-text">
                        Welcome, {{ user.username }}
                    </span>

                    <a href="{% url 'logout' %}"
                       class="btn btn-light btn-sm">
                        Logout
                    </a>

                {% else %}

                    <a href="{% url 'login' %}"
                       class="login-btn">
                        Login
                    </a>

                    <a href="{% url 'register' %}"
                       class="register-btn">
                        Register
                    </a>

                {% endif %}

            </div>

        </div>

    </div>

</nav>

    <!-- MAIN CONTENT -->

    <div class="container-fluid main-container">

        <!-- DJANGO MESSAGES -->

        {% if messages %}

            {% for message in messages %}

                <div class="message-box">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <!-- PAGE CONTENT -->

        {% block content %}
        {% endblock %}

    </div>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
