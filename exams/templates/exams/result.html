<h2 style="text-align:center;">Mock Test Result</h2>

<table style="width:60%; margin:auto; border-collapse:collapse; background:white;">

<tr style="background:#006400; color:white;">
<th style="padding:10px;">Subject</th>
<th style="padding:10px;">Score</th>
</tr>

{% for subject, score in results.items %}
<tr style="text-align:center;">
<td style="padding:10px;">{{ subject }}</td>
<td style="padding:10px;">{{ score }} / 100</td>
</tr>
{% endfor %}

<tr style="background:#f2f2f2; font-weight:bold; text-align:center;">
<td style="padding:10px;">Total</td>
<td style="padding:10px;">{{ total_score }} / 400</td>
</tr>

</table>

<br><br>

<div style="text-align:center;">
<a href="/" style="
padding:12px 25px;
background:#006400;
color:white;
text-decoration:none;
border-radius:8px;
">
Go Home
</a>
</div>
